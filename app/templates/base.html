<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>{% block title %}Jukebox From Hell{% endblock %}</title>
    <link rel="shortcut icon" href="/static/images/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        hellcyan: '#00b8e6',
                        hellred: '#ff2d2d',
                        hellglow: '#ff6b35',
                    },
                    fontFamily: {
                        creepy: ['Creepster', 'cursive'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="min-h-full flex flex-col bg-black text-white">

    <!-- Background -->
    <div class="fixed inset-0 -z-10">
        <img src="/static/images/music.jpg" alt="" class="w-full h-full object-cover opacity-20">
        <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/80 to-black"></div>
    </div>

    <!-- Nav -->
    <nav class="border-b border-white/10 backdrop-blur-sm bg-black/50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3 group">
                <img src="/static/images/devil.gif" alt="Jukebox From Hell" class="h-10 w-auto">
                <span class="font-creepy text-2xl text-hellcyan group-hover:text-hellglow transition-colors">
                    Jukebox From Hell
                </span>
            </a>
            <div class="flex gap-6 text-sm">
                <a href="/" class="text-gray-300 hover:text-hellcyan transition-colors">Pick A Song</a>
                <a href="/about" class="text-gray-300 hover:text-hellcyan transition-colors">About</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-1 flex flex-col">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/10 bg-black/80 backdrop-blur-sm">
        <div class="max-w-4xl mx-auto px-4 py-3 text-center">
            <a href="/" class="text-sm text-gray-500 hover:text-hellcyan transition-colors">
                Start All Over Again?
            </a>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
